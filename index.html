async function load(){
  const { data, error } = await supabaseClient
    .from('lab_data')
    .select('payload')
    .eq('id', 1)
    .single();

  if (error) {
    console.error('LOAD ERROR:', error);
  }

  if (data && data.payload) {
    app.db = data.payload;
  } else {
    app.db = seed();
    await save();
  }
}

async function save(){
  const { error } = await supabaseClient
    .from('lab_data')
    .upsert({ id: 1, payload: app.db });

  if (error) {
    console.error('SAVE ERROR:', error);
  }
}
    function userGroup(){ return app.user?.role === "admin" ? null : app.user?.u; }
    function account(u){ return USERS.find(x => x.u.toLowerCase() === String(u||"").trim().toLowerCase()); }
    function material(c){ return app.db.materials.find(x => x.code === c); }
    function machine(c){ return app.db.machines.find(x => x.code === c); }
    function test(c){ return app.db.tests.find(x => x.code === c); }
    function visibleTests(){ return app.user.role === "admin" ? app.db.tests : app.db.tests.filter(x => normalize(x.group) === normalize(userGroup())); }
    function visibleMachines(){ return app.user.role === "admin" ? app.db.machines : app.db.machines.filter(x => normalize(x.group) === normalize(userGroup())); }
    function visibleHistory(){ return app.user.role === "admin" ? app.db.history : app.db.history.filter(x => normalize(x.group) === normalize(userGroup())); }
    function visibleStandards(){ const set = new Set(visibleTests().map(x => x.code)); return app.db.standards.filter(x => set.has(x.testCode)); }

    function stockSummary(){
      return app.db.materials.map(m => {
        const lots = app.db.lots.filter(x => x.materialCode === m.code);
        return {...m, stock: lots.reduce((s,x)=>s+Number(x.qty||0),0), lots, nearest: lots.map(x=>x.expiryDate).sort()[0] || ""};
      });
    }

    function usageMap(items){
      const map = new Map();
      items.forEach(h => {
        app.db.standards
          .filter(s => s.testCode === h.testCode)
          .forEach(s => map.set(s.materialCode, (map.get(s.materialCode)||0) + Number(s.amount||0) * Number(h.qty||0)));
      });
      return map;
    }

    function alerts(){
      const use = usageMap(visibleHistory());
      const warnDate = Date.now() + Number(app.db.metadata.expiryDays||45)*86400000;
      return stockSummary().filter(m => {
        const avg = (use.get(m.code)||0)/30;
        const days = avg > 0 ? m.stock/avg : 9999;
        const expiry = m.lots.some(l => new Date(l.expiryDate).getTime() <= warnDate);
        return days <= Number(app.db.metadata.lowDays||7) || expiry;
      });
    }

    function filterRows(rows, term, picker){
      const q = normalize(term);
      if(!q) return rows;
      return rows.filter(row => picker(row).some(v => normalize(v).includes(q)));
    }

    function uniqueValues(rows, picker){
      return Array.from(new Set(rows.map(picker).filter(Boolean))).sort((a,b)=>String(a).localeCompare(String(b),"vi"));
    }

    function getSort(tableKey){
      return app.temp.sorting[tableKey] || {key:"",dir:"asc"};
    }

    function setSort(tableKey, key){
      const cur = getSort(tableKey);
      app.temp.sorting[tableKey] = cur.key===key ? {key,dir:cur.dir==="asc"?"desc":"asc"} : {key,dir:"asc"};
    }

    function compareValues(a,b){
      const na = Number(a), nb = Number(b);
      const aNum = !Number.isNaN(na) && String(a).trim()!=="";
      const bNum = !Number.isNaN(nb) && String(b).trim()!=="";
      if(aNum && bNum) return na-nb;
      return String(a??"").localeCompare(String(b??""),"vi",{numeric:true,sensitivity:"base"});
    }

    function sortRows(rows, tableKey, valueGetter){
      const {key,dir} = getSort(tableKey);
      if(!key) return rows;
      const sorted = rows.slice().sort((r1,r2)=>compareValues(valueGetter(r1,key), valueGetter(r2,key)));
      return dir==="desc" ? sorted.reverse() : sorted;
    }

    function selectSet(key){
      return app.temp.selected[key] || new Set();
    }

    function clearSelection(key){
      app.temp.selected[key] = new Set();
    }

    function toggleSelect(key,id,checked){
      const s = selectSet(key);
      checked ? s.add(id) : s.delete(id);
      app.temp.selected[key] = s;
    }

    function isSelected(key,id){
      return selectSet(key).has(id);
    }

    function selectedCount(key){
      return selectSet(key).size;
    }

    function toggleSelectAll(key, ids, checked){
      const s = selectSet(key);
      ids.forEach(id => checked ? s.add(id) : s.delete(id));
      app.temp.selected[key] = s;
    }

    function removeByIds(list, ids){
      const set = new Set(ids);
      return list.filter(x=>!set.has(x.id));
    }

    function sortIndicator(tableKey, key){
      const s = getSort(tableKey);
      if(s.key!==key) return "";
      return s.dir==="asc" ? " ▲" : " ▼";
    }

    function currentEdit(type){
      const editId = app.temp.editing[type];
      if(!editId) return null;
      return app.db[type].find(x => x.id === editId) || null;
    }

    function resetEdit(type){ app.temp.editing[type] = null; }

    function codeExists(list, code, ignoreId){
      const norm = normalize(code);
      return list.some(x => normalize(x.code) === norm && x.id !== ignoreId);
    }

    function stockStatus(row, items){
      const use = usageMap(items||visibleHistory());
      const avg = (use.get(row.code)||0)/30;
      const days = avg>0 ? row.stock/avg : 9999;
      const near = row.lots.some(l=>new Date(l.expiryDate).getTime() <= Date.now()+Number(app.db.metadata.expiryDays||45)*86400000);
      if(near) return {tone:"pill-danger", label:"Near expiry"};
      if(days <= Number(app.db.metadata.lowDays||7)) return {tone:"pill-warn", label:"Low stock"};
      return {tone:"pill-ok", label:"Stable"};
    }

    function dependencyMessage(type, row){
      if(type === "machines"){
        const testsRef = app.db.tests.filter(t => (t.machines||[]).includes(row.code)).length;
        const standardsRef = app.db.standards.filter(s => s.machineCode === row.code).length;
        const historyRef = app.db.history.filter(h => h.machineCode === row.code).length;
        if(testsRef || standardsRef || historyRef) return `May ${row.code}: tests=${testsRef}, standards=${standardsRef}, history=${historyRef}`;
      }
      if(type === "tests"){
        const standardsRef = app.db.standards.filter(s => s.testCode === row.code).length;
        const historyRef = app.db.history.filter(h => h.testCode === row.code).length;
        if(standardsRef || historyRef) return `Xet nghiem ${row.code}: standards=${standardsRef}, history=${historyRef}`;
      }
      if(type === "materials"){
        const standardsRef = app.db.standards.filter(s => s.materialCode === row.code).length;
        const lotsRef = app.db.lots.filter(l => l.materialCode === row.code).length;
        const txnsRef = app.db.txns.filter(t => t.materialCode === row.code).length;
        if(standardsRef || lotsRef || txnsRef) return `Vat tu ${row.code}: standards=${standardsRef}, lots=${lotsRef}, txns=${txnsRef}`;
      }
      return "";
    }

    function cascadeDeleteCatalog(type, row){
      if(type === "machines"){
        app.db.tests.forEach(t => t.machines = (t.machines||[]).filter(code => code!==row.code));
        app.db.standards = app.db.standards.filter(s => s.machineCode!==row.code);
        app.db.history = app.db.history.filter(h => h.machineCode!==row.code);
        return;
      }
      if(type === "tests"){
        app.db.standards = app.db.standards.filter(s => s.testCode!==row.code);
        app.db.history = app.db.history.filter(h => h.testCode!==row.code);
        return;
      }
      if(type === "materials"){
        app.db.standards = app.db.standards.filter(s => s.materialCode!==row.code);
        app.db.lots = app.db.lots.filter(l => l.materialCode!==row.code);
        app.db.txns = app.db.txns.filter(t => t.materialCode!==row.code);
      }
    }

    function reportHistory(){
      if(app.temp.start && app.temp.end && app.temp.start > app.temp.end) return [];
      return visibleHistory().filter(h => h.date >= app.temp.start && h.date <= app.temp.end);
    }

    function filteredReportHistory(){
      let rows = reportHistory();
      if(app.temp.filters.reportsGroup !== "all") rows = rows.filter(x => x.group === app.temp.filters.reportsGroup);
      if(app.temp.filters.reportsMachine !== "all") rows = rows.filter(x => x.machineCode === app.temp.filters.reportsMachine);
      if(app.temp.filters.reportsTest !== "all") rows = rows.filter(x => x.testCode === app.temp.filters.reportsTest);

    function trendRows(items){
      const map = {};
      items.forEach(h => {
        if(!map[h.date]) map[h.date] = {date:h.date, qty:0, cost:0};
        map[h.date].qty += Number(h.qty||0);
        map[h.date].cost += Number(h.totalCost||0);
      });
      return Object.values(map).sort((a,b)=>a.date.localeCompare(b.date));
    }

    function groupCostRows(items){
      const map = {};
      items.forEach(h => {
        if(!map[h.group]) map[h.group] = {group:h.group, qty:0, cost:0};
        map[h.group].qty += Number(h.qty||0);
        map[h.group].cost += Number(h.totalCost||0);
      });
      return Object.values(map).map(x => ({...x, avgCost: x.qty ? Math.round(x.cost/x.qty) : 0})).sort((a,b)=>b.cost-a.cost);
    }

    function machineAgg(items){
      const map = {};
      items.forEach(h => {
        if(!map[h.machineCode]) map[h.machineCode] = {machineCode:h.machineCode,machineName:machine(h.machineCode)?.name||"",qty:0,cost:0};
        map[h.machineCode].qty += Number(h.qty||0);
        map[h.machineCode].cost += Number(h.totalCost||0);
      });
      return Object.values(map).map(x=>({...x,avgCost:x.qty?Math.round(x.cost/x.qty):0})).sort((a,b)=>b.qty-a.qty);
    }

    function materialCostRows(items){
      return Array.from(usageMap(items).entries())
        .map(([code,qty]) => ({materialCode:code, materialName:material(code)?.name||code, qty:Number(qty.toFixed(2)), cost:Math.round(qty*Number(material(code)?.price||0))}))
        .sort((a,b)=>b.cost-a.cost);

    function forecastRows(items){
      const use = usageMap(items);
      const stock = new Map(stockSummary().map(x=>[x.code,x.stock]));
      return app.db.materials
        .map(m => {
          const forecast = Number(((use.get(m.code)||0) * 1.3).toFixed(2));
          const have = Number((stock.get(m.code)||0).toFixed(2));
          return {materialCode:m.code, materialName:m.name, unit:m.unit, forecastQty:forecast, stock:have, suggestedOrder:Math.max(0, Number((forecast-have).toFixed(2)))};
        })
        .filter(x => x.forecastQty > 0)
        .sort((a,b)=>b.suggestedOrder-a.suggestedOrder);

    function ensureAdvancedReportState(){
      if(!app.temp.reportAdvanced || typeof app.temp.reportAdvanced !== "object") app.temp.reportAdvanced = {};
      const st = app.temp.reportAdvanced;
      if(!st.simFrom) st.simFrom = app.temp.start;
      if(!st.simTo) st.simTo = app.temp.end;
      if(st.simQty == null || st.simQty === "") st.simQty = 1;
      if(st.simFixedMonthly == null || st.simFixedMonthly === "") st.simFixedMonthly = 0;
      if(st.batchInput == null) st.batchInput = "";
      if(st.batchMonths == null || st.batchMonths === "") st.batchMonths = 1;
      if(st.batchFixedMonthly == null || st.batchFixedMonthly === "") st.batchFixedMonthly = 0;
      if(!Object.prototype.hasOwnProperty.call(st, "batchResult")) st.batchResult = null;
      return st;
    }

    function reportMachineCandidates(testCode){
      const all = app.user ? visibleMachines() : app.db.machines;
      if(!testCode) return all;
      const t = test(testCode);
      const fromTest = new Set((t?.machines||[]).map(x=>String(x)));
      const fromStd = new Set(app.db.standards.filter(s=>s.testCode===testCode).map(s=>s.machineCode));
      const allow = new Set([...fromTest, ...fromStd]);
      return all.filter(m => allow.size ? allow.has(m.code) : true);
    }

    function standardsForReport(testCode, machineCode){
      if(!testCode) return [];
      const candidates = reportMachineCandidates(testCode);
      const selectedMachine = machineCode && candidates.some(m=>m.code===machineCode) ? machineCode : (candidates[0]?.code||"");
      return app.db.standards.filter(s => s.testCode===testCode && (!selectedMachine || s.machineCode===selectedMachine));
    }

    function variableCostPerTest(testCode, machineCode){
      return Math.round(standardsForReport(testCode, machineCode).reduce((sum, s) => sum + Number(s.amount||0) * Number(material(s.materialCode)?.price||0), 0));
    }

    function simulationSummary(){
      const st = ensureAdvancedReportState();
      const tests = visibleTests();
      const testCode = st.simTest && tests.some(t=>t.code===st.simTest) ? st.simTest : (tests[0]?.code||"");
      st.simTest = testCode;
      const machines = reportMachineCandidates(testCode);
      const machineCode = st.simMachine && machines.some(m=>m.code===st.simMachine) ? st.simMachine : (machines[0]?.code||"");
      st.simMachine = machineCode;
      const qty = Math.max(0, Number(st.simQty||0));
      const fixedMonthly = Math.max(0, Number(st.simFixedMonthly||0));
      const from = String(st.simFrom||app.temp.start||"");
      const to = String(st.simTo||app.temp.end||"");
      const fromDate = from ? new Date(from) : null;
      const toDate = to ? new Date(to) : null;
      let months = 1;
      if(fromDate && toDate && !Number.isNaN(fromDate.getTime()) && !Number.isNaN(toDate.getTime()) && fromDate <= toDate){
        months = Math.max(1, (toDate.getFullYear()-fromDate.getFullYear())*12 + (toDate.getMonth()-fromDate.getMonth()) + 1);
      }
      const variablePerTest = variableCostPerTest(testCode, machineCode);
      const fixedPerTest = qty>0 ? Math.round(fixedMonthly/qty) : 0;
      const totalPerTest = variablePerTest + fixedPerTest;
      const testObj = test(testCode);
      const revenuePerTest = Number(testObj?.price||0);
      const totalQty = qty * months;
      const variableTotal = variablePerTest * totalQty;
      const fixedTotal = fixedMonthly * months;
      const totalCost = variableTotal + fixedTotal;
      const revenue = revenuePerTest * totalQty;
      const margin = revenue - totalCost;
      const materials = standardsForReport(testCode, machineCode).map(s => {
        const mat = material(s.materialCode);
        const qtyTotal = Number((Number(s.amount||0) * totalQty).toFixed(4));
        const unitPrice = Number(mat?.price||0);
        return {materialCode:s.materialCode,materialName:mat?.name||"",unit:s.unit||mat?.unit||"",qty:qtyTotal,unitPrice,cost:Math.round(qtyTotal*unitPrice)};
      });
      return {testCode,machineCode,testName:testObj?.name||"",machineName:machine(machineCode)?.name||"",qty,months,totalQty,fixedMonthly,variablePerTest,fixedPerTest,totalPerTest,variableTotal,fixedTotal,totalCost,revenuePerTest,revenue,margin,materials};
    }

    function parseBatchInput(text){
      const rows = [];
      const errors = [];
      String(text||"").split(/\r?\n/).forEach((raw, idx) => {
        const line = raw.trim();
        if(!line) return;
        const parts = line.split(/[\t,;]+/).map(x=>x.trim()).filter(Boolean);
        if(parts.length < 2){
          errors.push(`Dong ${idx+1}: can it nhat Test va Qty.`);
          return;
        }
        let testCode = parts[0];
        let machineCode = "";
        let qtyText = parts[1];
        if(parts.length >= 3){
          machineCode = parts[1];
          qtyText = parts[2];
        }
        const qty = Number(qtyText);
        if(Number.isNaN(qty) || qty < 0){
          errors.push(`Dong ${idx+1}: Qty khong hop le.`);
          return;
        }
        rows.push({line:idx+1,testCode,machineCode,qty});
      });
      return {rows, errors};
    }

    function findTestForBatchRow(row){
      const q = normalize(row.testCode||"");
      if(!q) return null;
      return visibleTests().find(t => normalize(t.code)===q || normalize(t.name)===q) || null;
    }

    function buildBatchAnalysis(rows, months, fixedMonthly){
      const safeMonths = Math.max(1, Number(months||1));
      const safeFixed = Math.max(0, Number(fixedMonthly||0));
      const out = [];
      const errors = [];
      const totalMonthlyQty = rows.reduce((s,r)=>s+Number(r.qty||0),0);
      const fixedPerUnit = totalMonthlyQty>0 ? safeFixed/totalMonthlyQty : 0;
      const materialMap = new Map();

      rows.forEach(r => {
        const t = findTestForBatchRow(r);
        if(!t){
          errors.push(`Dong ${r.line}: khong tim thay xet nghiem ${r.testCode}.`);
          return;
        }
        const candidates = reportMachineCandidates(t.code);
        const m = r.machineCode && candidates.some(x=>x.code===r.machineCode) ? r.machineCode : (candidates[0]?.code||"");
        if(!m){
          errors.push(`Dong ${r.line}: khong tim thay may cho ${t.code}.`);
          return;
        }
        const monthlyQty = Number(r.qty||0);
        const periodQty = monthlyQty * safeMonths;
        const variablePerTest = variableCostPerTest(t.code, m);
        const variableCost = variablePerTest * periodQty;
        const fixedCost = Math.round(fixedPerUnit * periodQty);
        const totalCost = variableCost + fixedCost;
        const revenue = Number(t.price||0) * periodQty;

        standardsForReport(t.code, m).forEach(s => {
          const mat = material(s.materialCode);
          const matQty = Number((Number(s.amount||0) * periodQty).toFixed(4));
          const key = s.materialCode;
          const cur = materialMap.get(key) || {materialCode:key,materialName:mat?.name||"",unit:s.unit||mat?.unit||"",qty:0,cost:0};
          cur.qty = Number((cur.qty + matQty).toFixed(4));
          cur.cost += Math.round(matQty * Number(mat?.price||0));
          materialMap.set(key, cur);
        });

        out.push({
          line:r.line,
          testCode:t.code,
          testName:t.name,
          group:t.group,
          machineCode:m,
          monthlyQty,
          periodQty,
          price:Number(t.price||0),
          variablePerTest,
          variableCost,
          fixedCost,
          totalCost,
          revenue,
          margin: revenue-totalCost
        });
      });

      const totals = out.reduce((acc,r)=>{
        acc.monthlyQty += r.monthlyQty;
        acc.periodQty += r.periodQty;
        acc.variableCost += r.variableCost;
        acc.fixedCost += r.fixedCost;
        acc.totalCost += r.totalCost;
        acc.revenue += r.revenue;
        acc.margin += r.margin;
        return acc;
      },{monthlyQty:0,periodQty:0,variableCost:0,fixedCost:0,totalCost:0,revenue:0,margin:0});

      return {months:safeMonths,fixedMonthly:safeFixed,rows:out,materials:Array.from(materialMap.values()).sort((a,b)=>b.cost-a.cost),totals,errors};
    }

><td>${num(r.monthlyQty)}</td><td>${num(r.periodQty)}</td><td>${money(r.variableCost)}</td><td>${money(r.fixedCost)}</td><td>${money(r.totalCost)}</td><td>${money(r.revenue)}</td><td>${money(r.margin)}</td></tr>`).join("")||`<tr><td colspan="9"><div class="empty">No rows</div></td></tr>`}</tbody></table></div>`:""}${result?.errors?.length?`<div class="muted" style="margin-top:10px">${result.errors.map(e=>esc(e)).join("<br>")}</div>`:""}</div>`;

    function validateBackupPayload(payload){

    function upsertByCode(list, item, prefix){
      const code = String(item.code||"").trim();
      if(!code) return;
      const existing = list.find(x => normalize(x.code) === normalize(code));
      if(existing){
        Object.assign(existing, {...item, id:existing.id, code});
      }else{
        list.unshift({...item, id:id(prefix), code});
      }

    function upsertStandard(item){
      const machineCode = String(item.machineCode||"").trim();
      const testCode = String(item.testCode||"").trim();

      if(!machineCode || !testCode || !materialCode) return;
      const existing = app.db.standards.find(x => x.machineCode===machineCode && x.testCode===testCode && x.materialCode===materialCode);

        existing.unit = item.unit;
        existing.amount = Number(item.amount||0);
        existing.note = String(item.note||"");

    function testsForMachine(machineCode){
      const tests = visibleTests();
      if(!machineCode) return tests;
      const mapped = tests.filter(t => (t.machines||[]).includes(machineCode));
      const fallbackCodes = Array.from(new Set(app.db.standards.filter(s=>s.machineCode===machineCode).map(s=>s.testCode)));
      const fallback = tests.filter(t => fallbackCodes.includes(t.code));
      return Array.from(new Map(mapped.concat(fallback).map(t=>[t.code,t])).values());
    }

    function resolveMachinePick(value, machines){
      const q = normalize(value);
      if(!q) return null;
      const exact = machines.find(m => [m.code, m.name, machinePickLabel(m)].some(x=>normalize(x)===q));
      if(exact) return exact;
      const matched = machines.filter(m => [m.code, m.name, machinePickLabel(m)].some(x=>normalize(x).includes(q)));
      return matched.length===1 ? matched[0] : null;
    }

    function resolveTestPick(value, tests, machineCode){
      const q = normalize(value);
      if(!q) return null;
      const exact = tests.find(t => [t.code, t.name, testPickLabel(t,machineCode)].some(x=>normalize(x)===q));
      if(exact) return exact;
      const matched = tests.filter(t => [t.code, t.name, testPickLabel(t,machineCode)].some(x=>normalize(x).includes(q)));
      return matched.length===1 ? matched[0] : null;
    }

    function configuredStandardPairs(){
      const map = new Map();
      visibleStandards().forEach(s => {
        const key = `${s.machineCode}||${s.testCode}`;
        if(!map.has(key)) map.set(key,{machineCode:s.machineCode,testCode:s.testCode,count:0});
        map.get(key).count += 1;
      });
      return Array.from(map.values()).sort((a,b)=>a.machineCode.localeCompare(b.machineCode,"vi") || a.testCode.localeCompare(b.testCode,"vi"));
    }

    function filterMachinePicks(machines){
      const q = normalize(app.temp.search.stdMachinePick||"");
      if(!q) return machines;
      return machines.filter(m => normalize(machinePickLabel(m)).includes(q) || normalize(m.code).includes(q) || normalize(m.name).includes(q));
    }

    function filterTestPicks(tests, machineCode){
      const q = normalize(app.temp.search.stdTestPick||"");
      if(!q) return tests;
      return tests.filter(t => normalize(testPickLabel(t,machineCode)).includes(q) || normalize(t.code).includes(q) || normalize(t.name).includes(q));
    }

    function filterCopySources(pairs){
      const q = normalize(app.temp.search.stdCopyPair||"");
      if(!q) return pairs;
      return pairs.filter(p => {
        const t = test(p.testCode);
        const text = `${p.machineCode} ${p.testCode} ${t?.name||""}`;
        return normalize(text).includes(q);
      });
    }

    function standardsForPair(machineCode, testCode){
      return app.db.standards
        .filter(s => s.machineCode===machineCode && s.testCode===testCode)
        .map(s => stdDraftRow({materialCode:s.materialCode, unit:s.unit, amount:s.amount, note:s.note||""}));
    }

    function hydrateStdEditor(machineCode, testCode){
      const current = app.temp.stdEditor || {machineCode:"",testCode:"",rows:[]};
      if(current.machineCode===machineCode && current.testCode===testCode) return current.rows;
      const rows = standardsForPair(machineCode, testCode);
      app.temp.stdEditor = {machineCode, testCode, rows: rows.length ? rows : [stdDraftRow()]};
      return app.temp.stdEditor.rows;
    }

    function setStdEditorRows(rows, machineCode, testCode){
      app.temp.stdEditor = {
        machineCode: machineCode || app.temp.filters.stdCfgMachine || "",
        testCode: testCode || app.temp.filters.stdCfgTest || "",
        rows: rows.map(r=>stdDraftRow(r))
      };
    }

    function resolveMaterialByQuery(query){
      const q = normalize(query);
      if(!q) return null;
      const exactByCode = app.db.materials.find(m=>normalize(m.code)===q);
      if(exactByCode) return exactByCode;
      const exactByName = app.db.materials.find(m=>normalize(m.name)===q);
      if(exactByName) return exactByName;
      const exactByTrade = app.db.materials.find(m=>normalize(m.trade||"")===q);
      if(exactByTrade) return exactByTrade;
      const matched = app.db.materials.filter(m=>normalize(`${m.name} ${m.code} ${m.trade||""}`).includes(q));
      return matched.length===1 ? matched[0] : null;
    }

    function buildStdConfig(){
      const machines = visibleMachines();
      let machineCode = app.temp.filters.stdCfgMachine || machines[0]?.code || "";
      if(machineCode && !machines.some(m=>m.code===machineCode)) machineCode = machines[0]?.code || "";
      if(app.temp.filters.stdCfgMachine !== machineCode) app.temp.filters.stdCfgMachine = machineCode;

      const tests = testsForMachine(machineCode);
      let testCode = app.temp.filters.stdCfgTest || tests[0]?.code || "";
      if(testCode && !tests.some(t=>t.code===testCode)) testCode = tests[0]?.code || "";
      if(app.temp.filters.stdCfgTest !== testCode) app.temp.filters.stdCfgTest = testCode;

      const rows = machineCode && testCode ? hydrateStdEditor(machineCode, testCode) : [];
      const configuredPairs = configuredStandardPairs();
      const copySources = configuredPairs.filter(p => !(p.machineCode===machineCode && p.testCode===testCode));
      const machineOptions = filterMachinePicks(machines);
      const testOptions = filterTestPicks(tests, machineCode);
      const copySourceOptions = filterCopySources(copySources);

      return {machines,tests,machineCode,testCode,rows,copySources,configuredPairs,machineOptions,testOptions,copySourceOptions};
    }

    function previewConsumption(fd){
      const testCode = fd.get("testCode");
      const qty = Number(fd.get("qty")||0);
      const standards = app.db.standards.filter(x => x.testCode === testCode);
      if(!standards.length) return {rows:[],total:0,html:`<span class="pill pill-danger">No standards for this test</span>`};
      const stock = new Map(stockSummary().map(x=>[x.code,x.stock]));
      const rows = standards.map(s => {
        const m = material(s.materialCode);
        const need = Number((Number(s.amount||0)*qty).toFixed(4));
        const have = Number((stock.get(s.materialCode)||0).toFixed(4));
        const cost = Math.round(need*Number(m?.price||0));
        return {materialCode:s.materialCode,materialName:m?.name||"",unit:s.unit||m?.unit||"",need,have,enough:have>=need,cost};
      });
      const total = rows.reduce((a,b)=>a+b.cost,0);
      const html = `<div class="table-wrap" style="margin-top:14px"><table class="table"><thead><tr><th>Material</th><th>Need</th><th>Stock</th><th>Status</th><th>Cost</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.materialCode)} - ${esc(r.materialName)}</td><td>${num(r.need)} ${esc(r.unit)}</td><td>${num(r.have)} ${esc(r.unit)}</td><td><span class="pill ${r.enough?"pill-ok":"pill-danger"}">${r.enough?"Enough":"Short"}</span></td><td>${money(r.cost)}</td></tr>`).join("")}</tbody></table></div><div style="margin-top:12px"><b>Total cost:</b> ${money(total)}</div>`;
      return {rows,total,html};
    }

          data:{labels:Object.keys(d.groups),datasets:[{data:Object.values(d.groups),backgroundColor:["#0f766e","#14532d","#ca8a04","#3b82f6","#ef4444","#8b5cf6"]}]},
          options:{responsive:true,maintainAspectRatio:false}
        });
      }

      const rh = filteredReportHistory();
      const byDate = {};
      const byGroup = {};
      const byCost = {};
      rh.forEach(h => {
        byDate[h.date] = (byDate[h.date]||0) + Number(h.qty||0);
        byGroup[h.group] = (byGroup[h.group]||0) + Number(h.qty||0);
        byCost[h.group] = (byCost[h.group]||0) + Number(h.totalCost||0);
      });

      if(document.getElementById("rTrend")){
        const labels = Object.keys(byDate).sort();
        app.charts.rTrend = new Chart(document.getElementById("rTrend"),{
          type:"bar",
          data:{labels,datasets:[{label:"Qty",data:labels.map(x=>byDate[x]),backgroundColor:"#0f766e"}]},
          options:{responsive:true,maintainAspectRatio:false}
        });
      }

      if(document.getElementById("rGroup")){
        app.charts.rGroup = new Chart(document.getElementById("rGroup"),{
          type:"pie",
          data:{labels:Object.keys(byGroup),datasets:[{data:Object.values(byGroup),backgroundColor:["#14532d","#0f766e","#ca8a04","#f97316","#8b5cf6","#3b82f6"]}]},
          options:{responsive:true,maintainAspectRatio:false}
        });
      }

      if(document.getElementById("rCost")){
        app.charts.rCost = new Chart(document.getElementById("rCost"),{
          type:"bar",
          data:{labels:Object.keys(byCost),datasets:[{label:"Cost",data:Object.values(byCost),backgroundColor:"#ca8a04"}]},
          options:{responsive:true,maintainAspectRatio:false}
        });
      }

      if(document.getElementById("rMaterial")){
        const rows = materialCostRows(rh).slice(0,6);
        app.charts.rMaterial = new Chart(document.getElementById("rMaterial"),{
          type:"bar",
          data:{labels:rows.map(x=>x.materialName),datasets:[{label:"Cost",data:rows.map(x=>x.cost),backgroundColor:"#14532d"}]},
          options:{responsive:true,maintainAspectRatio:false,indexAxis:"y"}
        });
      }

      if(document.getElementById("rMachine")){
        const rows = machineAgg(rh);
        app.charts.rMachine = new Chart(document.getElementById("rMachine"),{
          type:"bar",
          data:{labels:rows.map(x=>x.machineCode),datasets:[{label:"Qty",data:rows.map(x=>x.qty),backgroundColor:"#3b82f6"}]},
          options:{responsive:true,maintainAspectRatio:false}
        });
      }
    }

    function mount(){
      document.getElementById("app").innerHTML = app.user ? appView() : loginView();
      bind();
      if(app.user) queueMicrotask(drawCharts);
    }

    function exportPack(key){
      if(key === "machines") return visibleMachines().map(x=>({MaMay:x.code,TenMay:x.name,Nhom:x.group}));
      if(key === "tests") return visibleTests().map(x=>({MaXetNghiem:x.code,TenXetNghiem:x.name,Nhom:x.group,Gia:x.price,May:(x.machines||[]).join(", ")}));
      if(key === "materials") return app.db.materials.map(x=>({MaVatTu:x.code,TenVatTu:x.name,DonViTinh:x.unit,TenThuongMai:x.trade,NhaCungCap:x.supplier,NuocSX:x.country,HangSX:x.brand,QuyCachDongGoi:x.pack,GiaTien:x.price}));
      if(key === "standards") return visibleStandards().map(x=>({MaMayXN:x.machineCode,TenMayXN:machine(x.machineCode)?.name||"",MaXetNghiem:x.testCode,TenXetNghiem:test(x.testCode)?.name||"",MaVatTu:x.materialCode,TenVatTu:material(x.materialCode)?.name||"",DonViTinh:x.unit,DinhMucTieuHao:x.amount,GhiChu:x.note||""}));
      return [];
    }

    function importPack(key, rows){
      if(!rows.length) return alert("No rows");
      if(key === "machines"){
        rows.forEach(r => upsertByCode(app.db.machines, {code:r.MaMay||r.code||"",name:r.TenMay||r.name||"",group:r.Nhom||r.group||""}, "m"));
      }
      if(key === "tests"){
        rows.forEach(r => upsertByCode(app.db.tests, {code:r.MaXetNghiem||r.code||"",name:r.TenXetNghiem||r.name||"",group:r.Nhom||r.group||"",price:Number(r.Gia||r.price||0),machines:String(r.May||r.machines||"").split(",").map(x=>x.trim()).filter(Boolean)}, "t"));
      }
      if(key === "materials"){
        rows.forEach(r => upsertByCode(app.db.materials, {code:r.MaVatTu||r.code||"",name:r.TenVatTu||r.name||"",unit:r.DonViTinh||r.unit||"",trade:r.TenThuongMai||r.trade||"",supplier:r.NhaCungCap||r.supplier||"",country:r.NuocSX||r.country||"",brand:r.HangSX||r.brand||"",pack:r.QuyCachDongGoi||r.pack||"",price:Number(r.GiaTien||r.price||0)}, "v"));
      }
      if(key === "standards"){
        rows.forEach(r => upsertStandard({machineCode:r.MaMayXN||"",testCode:r.MaXetNghiem||"",materialCode:r.MaVatTu||"",unit:r.DonViTinh||"",amount:Number(r.DinhMucTieuHao||0),note:String(r.GhiChu||"")}));
      }
      save();
      mount();
    }

    function reportExportRows(){
      const rows = filteredReportHistory();
      if(app.report === "trend") return trendRows(rows).map(x=>({Date:x.date,Qty:x.qty,Cost:x.cost}));
      if(app.report === "cost") return groupCostRows(rows).map(x=>({Group:x.group,Qty:x.qty,Cost:x.cost,AvgCost:x.avgCost}));
      if(app.report === "machine") return machineAgg(rows).map(x=>({Machine:x.machineCode,Name:x.machineName,Qty:x.qty,Cost:x.cost,AvgCost:x.avgCost}));
      if(app.report === "forecast") return forecastRows(rows).map(x=>({Material:x.materialCode,Name:x.materialName,Forecast:x.forecastQty,Stock:x.stock,SuggestedOrder:x.suggestedOrder,Unit:x.unit}));
      if(app.report === "simulation"){
        const s = simulationSummary();
        return [{Test:s.testCode,TestName:s.testName,Machine:s.machineCode,MachineName:s.machineName,QtyPerMonth:s.qty,Months:s.months,VariablePerTest:s.variablePerTest,TotalPerTest:s.totalPerTest,VariableTotal:s.variableTotal,FixedTotal:s.fixedTotal,TotalCost:s.totalCost,Revenue:s.revenue,Margin:s.margin}];
      }
      if(app.report === "batch"){
        const st = ensureAdvancedReportState();
        const rs = st.batchResult?.rows || [];
        return rs.map(r=>({Line:r.line,Test:r.testCode,TestName:r.testName,Machine:r.machineCode,MonthlyQty:r.monthlyQty,PeriodQty:r.periodQty,VariableCost:r.variableCost,FixedCost:r.fixedCost,TotalCost:r.totalCost,Revenue:r.revenue,Margin:r.margin}));
      }
      return [];
    }

    function bind(){
      const lf = document.getElementById("loginForm");
      if(lf) lf.onsubmit = e => {
        e.preventDefault();
        const fd = new FormData(lf);
        const u = account(fd.get("u"));
        if(!u || u.p !== fd.get("p")) return alert("Invalid login");
        app.user = u;
        try { sessionStorage.setItem('lab-user', JSON.stringify({u:u.u,role:u.role,label:u.label})); } catch(e) {}
        mount();
      };

      document.querySelectorAll("[data-nav]").forEach(b => b.onclick = () => { app.view = b.dataset.nav; mount(); });
      document.querySelectorAll("[data-cat]").forEach(b => b.onclick = () => { app.catalog = b.dataset.cat; mount(); });
      document.querySelectorAll("[data-report]").forEach(b => b.onclick = () => { app.report = b.dataset.report; mount(); });

      const logout = document.getElementById("logout");
      if(logout) logout.onclick = () => { app.user = null; try { sessionStorage.removeItem('lab-user'); } catch(e) {} clearCharts(); mount(); };

      const reset = document.getElementById("resetDb");
      if(reset) reset.onclick = () => {
        if(!confirm("Reload seed data?")) return;
        app.db = seed();
        app.temp.editing = {machines:null,tests:null,materials:null};
        app.temp.selected = {machines:new Set(),tests:new Set(),materials:new Set(),standards:new Set(),inventory:new Set(),txns:new Set(),history:new Set()};
        save();
        mount();
      };

      const backup = document.getElementById("backupJson");
      if(backup) backup.onclick = () => exportBackupJson();

      const restore = document.getElementById("restoreJsonFile");
      if(restore) restore.onchange = () => {
        const file = restore.files && restore.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try{
            const parsed = JSON.parse(String(ev.target.result||"{}"));
            const checked = validateBackupPayload(parsed);
            if(!checked.ok) return alert(checked.error);
            if(!confirm("Restore JSON se ghi de du lieu hien tai. Tiep tuc?")) return;
            app.db = clone(checked.data);
            app.temp.editing = {machines:null,tests:null,materials:null};
            app.temp.selected = {machines:new Set(),tests:new Set(),materials:new Set(),standards:new Set(),inventory:new Set(),txns:new Set(),history:new Set()};
            save();
            mount();
          }catch(err){
            alert("Khong doc duoc JSON backup.");
          }finally{
            restore.value = "";
          }
        };
        reader.readAsText(file);
      };

      document.querySelectorAll("[data-search]").forEach(i => {
        const applySearch = () => {
          const key = i.dataset.search;
          app.temp.search[key] = i.value;
          const caret = i.selectionStart ?? i.value.length;
          mount();
          const next = document.querySelector(`[data-search='${key}']`);
          if(next){
            next.focus();
            const pos = Math.min(caret, next.value.length);
            next.setSelectionRange(pos, pos);
          }
        };
        i.oncompositionstart = () => { i.dataset.composing = "1"; };
        i.oncompositionend = () => {
          i.dataset.composing = "0";
          applySearch();
        };
        i.oninput = () => {
          if(i.dataset.composing === "1") return;
          applySearch();
        };
      });

      document.querySelectorAll("[data-filter]").forEach(i => i.onchange = () => {
        app.temp.filters[i.dataset.filter] = i.value;
        mount();
      });

      document.querySelectorAll("[data-sort]").forEach(b => b.onclick = () => {
        setSort(b.dataset.sort, b.dataset.key);
        mount();
      });

      document.querySelectorAll("[data-sort-select]").forEach(sel => sel.onchange = () => {
        const [key, dir] = String(sel.value||"date:desc").split(":");
        app.temp.sorting[sel.dataset.sortSelect] = {key:key||"date", dir:dir==="asc"?"asc":"desc"};
        mount();
      });

      document.querySelectorAll("[data-check-row]").forEach(chk => chk.onchange = () => {
        toggleSelect(chk.dataset.checkRow, chk.dataset.id, chk.checked);
        mount();
      });

      document.querySelectorAll("[data-check-all]").forEach(chk => chk.onchange = () => {
        const key = chk.dataset.checkAll;
        const ids = Array.from(document.querySelectorAll(`[data-check-row='${key}']`)).map(x=>x.dataset.id);
        toggleSelectAll(key, ids, chk.checked);
        mount();
      });

      const bulkDelMachines = document.getElementById("bulkDelMachines");
      if(bulkDelMachines) bulkDelMachines.onclick = () => {
        const ids = Array.from(selectSet("machines"));
        if(!ids.length) return alert("Chua chon dong nao.");
        const rows = ids.map(id=>app.db.machines.find(x=>x.id===id)).filter(Boolean);
        const deps = rows.map(r=>dependencyMessage("machines",r)).filter(Boolean);
        const msg = deps.length
          ? `Xoa ${rows.length} may va du lieu lien quan?\n` + deps.slice(0,8).join("\n")
          : `Xoa ${rows.length} may da chon?`;
        if(!confirm(msg)) return;
        rows.forEach(r=>cascadeDeleteCatalog("machines", r));
        app.db.machines = removeByIds(app.db.machines, rows.map(r=>r.id));
        clearSelection("machines");
        save();
        mount();
      };

      const bulkDelTests = document.getElementById("bulkDelTests");
      if(bulkDelTests) bulkDelTests.onclick = () => {
        const ids = Array.from(selectSet("tests"));
        if(!ids.length) return alert("Chua chon dong nao.");
        const rows = ids.map(id=>app.db.tests.find(x=>x.id===id)).filter(Boolean);
        const deps = rows.map(r=>dependencyMessage("tests",r)).filter(Boolean);
        const msg = deps.length
          ? `Xoa ${rows.length} xet nghiem va du lieu lien quan?\n` + deps.slice(0,8).join("\n")
          : `Xoa ${rows.length} xet nghiem da chon?`;
        if(!confirm(msg)) return;
        rows.forEach(r=>cascadeDeleteCatalog("tests", r));
        app.db.tests = removeByIds(app.db.tests, rows.map(r=>r.id));
        clearSelection("tests");
        save();
        mount();
      };

      const bulkDelMaterials = document.getElementById("bulkDelMaterials");
      if(bulkDelMaterials) bulkDelMaterials.onclick = () => {
        const ids = Array.from(selectSet("materials"));
        if(!ids.length) return alert("Chua chon dong nao.");
        const rows = ids.map(id=>app.db.materials.find(x=>x.id===id)).filter(Boolean);
        const deps = rows.map(r=>dependencyMessage("materials",r)).filter(Boolean);
        const msg = deps.length
          ? `Xoa ${rows.length} vat tu va du lieu lien quan?\n` + deps.slice(0,8).join("\n")
          : `Xoa ${rows.length} vat tu da chon?`;
        if(!confirm(msg)) return;
        rows.forEach(r=>cascadeDeleteCatalog("materials", r));
        app.db.materials = removeByIds(app.db.materials, rows.map(r=>r.id));
        clearSelection("materials");
        save();
        mount();
      };

      document.querySelectorAll("[data-edit]").forEach(b => b.onclick = () => {
        app.temp.editing[b.dataset.edit] = b.dataset.id;
        mount();
      });

      document.querySelectorAll("[data-clear-edit]").forEach(b => b.onclick = () => {
        resetEdit(b.dataset.clearEdit);
        mount();
      });

      const mf = document.getElementById("machineForm");
      if(mf) mf.onsubmit = e => {
        e.preventDefault();
        const fd = new FormData(mf);
        const editId = app.temp.editing.machines;
        const payload = {code:String(fd.get("code")||"").trim(),name:String(fd.get("name")||"").trim(),group:String(fd.get("group")||"").trim()};
        if(!payload.code || !payload.name || !payload.group) return alert("Code, name, group are required.");
        if(codeExists(app.db.machines, payload.code, editId)) return alert("Machine code already exists.");
        if(editId){
          const row = app.db.machines.find(x=>x.id===editId);
          if(!row) return alert("Machine not found.");
          Object.assign(row,payload);
        }else{
          app.db.machines.unshift({id:id("m"),...payload});
        }
        resetEdit("machines");
        save();
        mount();
      };

      const tf = document.getElementById("testForm");
      if(tf) tf.onsubmit = e => {
        e.preventDefault();
        const fd = new FormData(tf);
        const editId = app.temp.editing.tests;
        const code = String(fd.get("code")||"").trim();
        const name = String(fd.get("name")||"").trim();
        const group = String(fd.get("group")||"").trim();
        const price = Number(fd.get("price")||0);
        const machines = String(fd.get("machines")||"").split(",").map(x=>x.trim()).filter(Boolean);
        if(!code || !name || !group) return alert("Code, name, group are required.");
        if(Number.isNaN(price) || price < 0) return alert("Price must be >= 0.");
        if(codeExists(app.db.tests, code, editId)) return alert("Test code already exists.");
        const unknownMachines = machines.filter(x => !app.db.machines.some(m => normalize(m.code)===normalize(x)));
        if(unknownMachines.length) return alert("Unknown machine code: " + unknownMachines.join(", "));
        if(editId){
          const row = app.db.tests.find(x=>x.id===editId);
          if(!row) return alert("Test not found.");
          Object.assign(row,{code,name,group,price,machines});
        }else{
          app.db.tests.unshift({id:id("t"),code,name,group,price,machines});
        }
        resetEdit("tests");
        save();
        mount();
      };

      const vf = document.getElementById("materialForm");
      if(vf) vf.onsubmit = e => {
        e.preventDefault();
        const fd = new FormData(vf);
        const editId = app.temp.editing.materials;
        const payload = {
          code:String(fd.get("code")||"").trim(),
          name:String(fd.get("name")||"").trim(),
          unit:String(fd.get("unit")||"").trim(),
          trade:String(fd.get("trade")||""),
          supplier:String(fd.get("supplier")||""),
          country:String(fd.get("country")||""),
          brand:String(fd.get("brand")||""),
          pack:String(fd.get("pack")||""),
          price:Number(fd.get("price")||0)
        };
        if(!payload.code || !payload.name || !payload.unit) return alert("Code, name, unit are required.");
        if(Number.isNaN(payload.price) || payload.price < 0) return alert("Price must be >= 0.");
        if(codeExists(app.db.materials, payload.code, editId)) return alert("Material code already exists.");
        if(editId){
          const row = app.db.materials.find(x=>x.id===editId);
          if(!row) return alert("Material not found.");
          Object.assign(row,payload);
        }else{
          app.db.materials.unshift({id:id("v"),...payload});
        }
        resetEdit("materials");
        save();
        mount();
      };

      document.querySelectorAll("[data-del]").forEach(b => b.onclick = () => {
        const map = {machines:"machines",tests:"tests",materials:"materials",standards:"standards"};
        const key = map[b.dataset.del];
        const row = app.db[key].find(x=>x.id===b.dataset.id);
        if(!row) return;
        if(key !== "standards"){
          const dep = dependencyMessage(key, row);
          const msg = dep ? `Xoa dong va du lieu lien quan?\n${dep}` : "Delete row?";
          if(!confirm(msg)) return;
          cascadeDeleteCatalog(key, row);
        }else{
          if(!confirm("Delete row?")) return;
        }
        app.db[key] = app.db[key].filter(x=>x.id!==b.dataset.id);
        if(app.temp.editing[key] === b.dataset.id) resetEdit(key);
        save();
        mount();
      });

      const machinePick = document.getElementById("stdMachinePick");
      if(machinePick) machinePick.onchange = () => {
        const code = String(machinePick.value||"").trim();
        if(!machine(code)) return alert("Khong tim thay MaMayXN hop le");
        app.temp.filters.stdCfgMachine = code;
        const tests = testsForMachine(code);
        const nextTest = tests[0]?.code || "";
        app.temp.filters.stdCfgTest = nextTest;
        if(nextTest) hydrateStdEditor(code, nextTest);
        mount();
      };

      const testPick = document.getElementById("stdTestPick");
      if(testPick) testPick.onchange = () => {
        const cfg = buildStdConfig();
        const code = String(testPick.value||"").trim();
        if(!cfg.tests.some(t=>t.code===code)) return alert("Khong tim thay MaXetNghiem hop le");
        app.temp.filters.stdCfgTest = code;
        if(cfg.machineCode) hydrateStdEditor(cfg.machineCode, code);
        mount();
      };

      document.querySelectorAll("[data-std-edit-pair]").forEach(b => b.onclick = () => {
        const [machineCode,testCode] = String(b.dataset.stdEditPair||"").split("||");
        if(!machine(machineCode) || !test(testCode)) return;
        app.temp.filters.stdCfgMachine = machineCode;
        app.temp.filters.stdCfgTest = testCode;
        app.temp.search.stdMachinePick = "";
        app.temp.search.stdTestPick = "";
        hydrateStdEditor(machineCode, testCode);
        mount();
      });

      document.querySelectorAll("[data-std-delete-pair]").forEach(b => b.onclick = () => {
        const [machineCode,testCode] = String(b.dataset.stdDeletePair||"").split("||");
        if(!machineCode || !testCode) return;
        const count = app.db.standards.filter(x=>x.machineCode===machineCode && x.testCode===testCode).length;
        if(!count) return;
        if(!confirm(`Xoa ${count} dong dinh muc cua ${machineCode} | ${testCode}?`)) return;
        app.db.standards = app.db.standards.filter(x => !(x.machineCode===machineCode && x.testCode===testCode));
        if(app.temp.filters.stdCfgMachine===machineCode && app.temp.filters.stdCfgTest===testCode){
          setStdEditorRows([stdDraftRow()], machineCode, testCode);
        }
        save();
        mount();
      });

      document.querySelectorAll("[data-std-draft]").forEach(i => i.onchange = () => {
        const rowId = i.dataset.row;
        const field = i.dataset.stdDraft;
        const cfg = buildStdConfig();
        const rows = cfg.rows.map(r=>stdDraftRow(r));
        const idx = rows.findIndex(r=>r.draftId===rowId);
        if(idx<0) return;
        const row = rows[idx];

        if(field === "amount"){
          const amount = Number(i.value||0);
          if(Number.isNaN(amount) || amount < 0) return alert("DinhMucTieuHao phai >= 0"), mount();
          row.amount = amount;
        }

        if(field === "materialQuery"){
          row.materialQuery = String(i.value||"").trim();
          const found = resolveMaterialByQuery(row.materialQuery);
          if(found){
            row.materialCode = found.code;
            row.unit = found.unit || "";
            row.materialQuery = found.name;
          }else{
            row.materialCode = "";
            row.unit = "";
          }
        }

        if(field === "note"){
          row.note = String(i.value||"");
        }

        setStdEditorRows(rows, cfg.machineCode, cfg.testCode);
        mount();
      });

      document.querySelectorAll("[data-std-draft-remove]").forEach(b => b.onclick = () => {
        const cfg = buildStdConfig();
        const rows = cfg.rows.filter(r=>r.draftId!==b.dataset.stdDraftRemove).map(r=>stdDraftRow(r));
        setStdEditorRows(rows.length ? rows : [stdDraftRow()], cfg.machineCode, cfg.testCode);
        mount();
      });

      const addStdDraft = document.getElementById("addStdDraft");
      if(addStdDraft) addStdDraft.onclick = () => {
        const cfg = buildStdConfig();
        if(!cfg.machineCode || !cfg.testCode) return alert("Vui long chon may va xet nghiem truoc");
        const rows = cfg.rows.map(r=>stdDraftRow(r));
        rows.push(stdDraftRow());
        setStdEditorRows(rows, cfg.machineCode, cfg.testCode);
        mount();
      };

      const copy = document.getElementById("copyForm");
      if(copy) copy.onsubmit = e => {
        e.preventDefault();
        const cfg = buildStdConfig();
        const fd = new FormData(copy);
        const fromPair = String(fd.get("fromPair")||"").trim();
        const [fromMachine, fromTest] = fromPair.split("||");
        if(!cfg.machineCode || !cfg.testCode) return alert("Vui long chon may va xet nghiem dich");
        if(!fromMachine || !fromTest) return alert("Vui long chon nguon copy");
        if(fromMachine===cfg.machineCode && fromTest===cfg.testCode) return alert("Nguon va dich khong duoc giong nhau");
        const src = app.db.standards.filter(x=>x.machineCode===fromMachine && x.testCode===fromTest);
        if(!src.length) return alert("Nguon copy chua co dinh muc");
        const rows = src.map(s => stdDraftRow({materialCode:s.materialCode, unit:s.unit, amount:s.amount}));
        setStdEditorRows(rows.length ? rows : [stdDraftRow()], cfg.machineCode, cfg.testCode);
        alert(`Da copy ${rows.length} dong dinh muc tu ${fromMachine} | ${fromTest}.`);
        mount();
      };

      const saveStdConfig = document.getElementById("saveStdConfig");
      if(saveStdConfig) saveStdConfig.onclick = () => {
        const machineCode = String(app.temp.filters.stdCfgMachine||"").trim();
        const testCode = String(app.temp.filters.stdCfgTest||"").trim();
        if(!machine(machineCode)) return alert("MaMayXN khong hop le");
        if(!test(testCode)) return alert("MaXetNghiem khong hop le");

        const cfg = buildStdConfig();
        const draftRows = cfg.rows.map(r=>stdDraftRow(r));
        const seen = new Set();
        const rows = [];

        for(const r of draftRows){
          const found = r.materialCode ? material(r.materialCode) : resolveMaterialByQuery(r.materialQuery);
          if(!found){
            if(!r.materialQuery && !r.materialCode && Number(r.amount||0)===0) continue;
            return alert("Co dong vat tu chua hop le, vui long chon lai TenVatTu.");
          }
          const amount = Number(r.amount||0);
          if(Number.isNaN(amount) || amount < 0) return alert("DinhMucTieuHao phai >= 0");
          if(amount===0) continue;
          if(seen.has(found.code)) return alert(`Trung MaVatTu ${found.code} trong cung mot cau hinh.`);
          seen.add(found.code);
          rows.push({materialCode:found.code, unit:String(r.unit||found.unit||"").trim(), amount, note:String(r.note||"").trim()});
        }

        app.db.standards = app.db.standards.filter(x => !(x.machineCode===machineCode && x.testCode===testCode));
        rows.forEach(r => app.db.standards.unshift({id:id("s"),machineCode,testCode,materialCode:r.materialCode,unit:r.unit,amount:r.amount,note:r.note||""}));
        setStdEditorRows(rows.length ? rows.map(r=>stdDraftRow({materialCode:r.materialCode,unit:r.unit,amount:r.amount,note:r.note})) : [stdDraftRow()], machineCode, testCode);
        app.temp.stdSavedMsg = true;
        save();
        mount();
        setTimeout(() => { app.temp.stdSavedMsg = false; mount(); }, 2000);
      };

      const cf = document.getElementById("consumptionForm");
      const preview = document.getElementById("previewCalc");
      if(preview && cf) preview.onclick = () => {
        const fd = new FormData(cf);
        app.temp.consumptionDate = String(fd.get("date"));
        window.latestCalc = previewConsumption(fd);
        document.getElementById("calcPreview").innerHTML = window.latestCalc.html;
      };

      if(cf) cf.onsubmit = e => {
        e.preventDefault();
        const fd = new FormData(cf);
        const qty = Number(fd.get("qty")||0);
        if(Number.isNaN(qty) || qty <= 0) return alert("Quantity must be > 0");
        const calc = previewConsumption(fd);
        if(!calc.rows.length) return alert("No standards");
        if(calc.rows.some(r=>!r.enough) && !confirm("Some materials are short. Save anyway?")) return;
        calc.rows.forEach(r=>deduct(r.materialCode,r.need));
        const t = test(fd.get("testCode"));
        app.db.history.unshift({id:id("h"),date:String(fd.get("date")),testCode:String(fd.get("testCode")),qty,machineCode:String(fd.get("machineCode")),group:t?.group||"",totalCost:calc.total,actor:app.user.u});
        window.latestCalc = calc;
        save();
        mount();
      };

      const exportCalc = document.getElementById("exportCalc");
      if(exportCalc) exportCalc.onclick = () => {
        if(!window.latestCalc?.rows?.length) return alert("No calculation to export");
        exportRows("ket_qua_tieu_hao.xlsx", window.latestCalc.rows);
      };

      const lotForm = document.getElementById("lotForm");
      if(lotForm) lotForm.onsubmit = e => {
        e.preventDefault();
        const fd = new FormData(lotForm);
        const qty = Number(fd.get("qty")||0);
        if(Number.isNaN(qty) || qty < 0) return alert("Qty must be >= 0");
        const lot = {id:id("l"),materialCode:String(fd.get("materialCode")),lotNo:String(fd.get("lotNo")||"").trim(),expiryDate:String(fd.get("expiryDate")),qty,unit:String(fd.get("unit")||"").trim(),receivedDate:String(fd.get("receivedDate")),note:String(fd.get("note")||"")};
        if(!lot.lotNo || !lot.unit) return alert("Lot and unit are required");
        app.db.lots.unshift(lot);
        app.db.txns.unshift({id:id("x"),type:"IN",date:lot.receivedDate,materialCode:lot.materialCode,lotNo:lot.lotNo,qty:lot.qty,note:"Nhap kho",actor:app.user.u});
        save();
        mount();
      };

      const txnForm = document.getElementById("txnForm");
      if(txnForm) txnForm.onsubmit = e => {
        e.preventDefault();
        const fd = new FormData(txnForm);
        const type = String(fd.get("type"));
        const materialCode = String(fd.get("materialCode"));
        const lotNo = String(fd.get("lotNo")||"").trim();
        const qty = Number(fd.get("qty")||0);
        if(!lotNo) return alert("Lot is required");
        if(Number.isNaN(qty) || qty <= 0) return alert("Qty must be > 0");

        let lot = app.db.lots.find(x=>x.materialCode===materialCode && x.lotNo===lotNo);
        if(!lot && type === "IN"){
          const m = material(materialCode);
          lot = {id:id("l"),materialCode,lotNo,expiryDate:day(90),qty:0,unit:m?.unit||"",receivedDate:String(fd.get("date")),note:"From txn"};
          app.db.lots.unshift(lot);
        }
        if(!lot) return alert("Lot not found");
        if(type === "OUT" && Number(lot.qty||0) < qty) return alert("Qty exceeds stock");

        lot.qty = Number((Number(lot.qty||0) + (type === "IN" ? qty : -qty)).toFixed(4));
        app.db.txns.unshift({id:id("x"),type,date:String(fd.get("date")),materialCode,lotNo,qty,note:String(fd.get("note")||""),actor:app.user.u});
        save();
        mount();
      };

      document.querySelectorAll("[data-export]").forEach(b => b.onclick = () => exportRows(`${b.dataset.export}.xlsx`, exportPack(b.dataset.export)));
      document.querySelectorAll("[data-import]").forEach(i => i.onchange = () => {
        const file = i.files && i.files[0];
        if(!file) return;
        parseFile(file, rows => {
          importPack(i.dataset.import, rows);
          i.value = "";
        });
      });

      const start = document.getElementById("start");
      const end = document.getElementById("end");
      if(start) start.onchange = () => {
        if(end && end.value && start.value > end.value) return alert("From date must be <= To date");
        app.temp.start = start.value;
        mount();
      };
      if(end) end.onchange = () => {
        if(start && start.value && start.value > end.value) return alert("To date must be >= From date");
        app.temp.end = end.value;
        mount();
      };

      const simTest = document.getElementById("simTest");
      if(simTest) simTest.onchange = () => {
        ensureAdvancedReportState().simTest = simTest.value;
        ensureAdvancedReportState().simMachine = "";
        mount();
      };
      const simMachine = document.getElementById("simMachine");
      if(simMachine) simMachine.onchange = () => {
        ensureAdvancedReportState().simMachine = simMachine.value;
        mount();
      };
      const simFrom = document.getElementById("simFrom");
      if(simFrom) simFrom.onchange = () => {
        ensureAdvancedReportState().simFrom = simFrom.value;
        mount();
      };
      const simTo = document.getElementById("simTo");
      if(simTo) simTo.onchange = () => {
        ensureAdvancedReportState().simTo = simTo.value;
        mount();
      };
      const simQty = document.getElementById("simQty");
      if(simQty) simQty.oninput = () => {
        ensureAdvancedReportState().simQty = Number(simQty.value||0);
        mount();
      };
      const simFixedMonthly = document.getElementById("simFixedMonthly");
      if(simFixedMonthly) simFixedMonthly.oninput = () => {
        ensureAdvancedReportState().simFixedMonthly = Number(simFixedMonthly.value||0);
        mount();
      };

      const batchInput = document.getElementById("batchInput");
      if(batchInput) batchInput.oninput = () => {
        ensureAdvancedReportState().batchInput = batchInput.value;
      };
      const batchMonths = document.getElementById("batchMonths");
      if(batchMonths) batchMonths.oninput = () => {
        ensureAdvancedReportState().batchMonths = Math.max(1, Number(batchMonths.value||1));
      };
      const batchFixedMonthly = document.getElementById("batchFixedMonthly");
      if(batchFixedMonthly) batchFixedMonthly.oninput = () => {
        ensureAdvancedReportState().batchFixedMonthly = Math.max(0, Number(batchFixedMonthly.value||0));
      };
      const batchSample = document.getElementById("batchSample");
      if(batchSample) batchSample.onclick = () => {
        const st = ensureAdvancedReportState();
        st.batchInput = "XN-GLU, M-HS01, 120\nXN-CBC, M-HH01, 150\nXN-PCR, M-SH01, 40";
        mount();
      };
      const batchAnalyze = document.getElementById("batchAnalyze");
      if(batchAnalyze) batchAnalyze.onclick = () => {
        const st = ensureAdvancedReportState();
        const parsed = parseBatchInput(st.batchInput);
        const analyzed = buildBatchAnalysis(parsed.rows, st.batchMonths, st.batchFixedMonthly);
        analyzed.errors = [...parsed.errors, ...(analyzed.errors||[])];
        st.batchResult = analyzed;
        mount();
      };
      const batchClear = document.getElementById("batchClear");
      if(batchClear) batchClear.onclick = () => {
        const st = ensureAdvancedReportState();
        st.batchInput = "";
        st.batchResult = null;
        mount();
      };
      const exportBatchMaterials = document.getElementById("exportBatchMaterials");
      if(exportBatchMaterials) exportBatchMaterials.onclick = () => exportRows("bao_cao_batch_materials.xlsx", batchMaterialExportRows());

      const exportReport = document.getElementById("exportReport");
      if(exportReport) exportReport.onclick = () => exportRows(`bao_cao_${app.report}.xlsx`, reportExportRows());
    }

    function deduct(code, need){
      const lots = app.db.lots.filter(x=>x.materialCode===code).sort((a,b)=>new Date(a.expiryDate)-new Date(b.expiryDate));
      let left = need;
      lots.forEach(l => {
        if(left <= 0) return;
        const take = Math.min(Number(l.qty||0), left);
        l.qty = Number((Number(l.qty||0)-take).toFixed(4));
        left = Number((left-take).toFixed(4));
        if(take > 0) app.db.txns.unshift({id:id("x"),type:"OUT",date:app.temp.consumptionDate,materialCode:code,lotNo:l.lotNo,qty:take,note:"Auto deduct",actor:app.user.u});
      });
    }

  (async () => {
    await load();
    try {
      const saved = sessionStorage.getItem('lab-user');
      if(saved) app.user = JSON.parse(saved);
    } catch(e) {}
    mount();
  })();
  </script>
</body>
</html>
